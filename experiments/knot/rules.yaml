domain: knot
descriptors:
  - key: endpoint
    value: shorten
    descriptors:
      - key: user_tier
        value: premium
        rate_limit:
          algorithm: sliding_window_log
          unit: minute
          requests_per_unit: 50
      - key: user_tier
        value: enterprise
        rate_limit:
          algorithm: sliding_window_log
          unit: minute
          requests_per_unit: 500
    rate_limit:
      algorithm: sliding_window_log
      unit: minute
      requests_per_unit: 10
  - key: endpoint
    value: redirect
    rate_limit:
      algorithm: token_bucket
      unit: second
      requests_per_unit: 50
      burst: 100
